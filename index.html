<!DOCTYPE html>
<html>
<head>
    <title>Insertion Sort Visualizer</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>Insertion Sort Visualizer</h1>

    <div class="controls">

        <input type="text" id="numbers"
        placeholder="Enter numbers like 5,3,8,1,9">

        <br>

        <button onclick="generateBars()">
            Generate
        </button>

        <button onclick="insertionSort()">
            Start Sorting
        </button>

    </div>

    <div id="array-container"></div>

    <div id="result"></div>

    <script src="script.js"></script>

</body>
</html>
