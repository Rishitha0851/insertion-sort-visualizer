<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
    content="width=device-width, initial-scale=1.0">

    <title>Quick Sort Visualizer Game</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <div class="background-circle one"></div>
    <div class="background-circle two"></div>

    <div class="container">

        <h1>Quick Sort Visualizer</h1>

        <p class="subtitle">
            Interactive Sorting Game Using Quick Sort Algorithm
        </p>

        <div class="input-section">

            <input
            type="text"
            id="array-input"
            placeholder="Enter numbers like 45,12,78,23,9">

            <button onclick="createArray()">
                Generate Array
            </button>

            <button onclick="quickSortStart()">
                Start Sorting
            </button>

        </div>

        <div id="array-container"></div>

        <div id="status"></div>

        <div class="info-box">

            <div class="card">
                <h2>Algorithm</h2>
                <p>Quick Sort</p>
            </div>

            <div class="card">
                <h2>Best Case</h2>
                <p>O(n log n)</p>
            </div>

            <div class="card">
                <h2>Worst Case</h2>
                <p>O(n²)</p>
            </div>

            <div class="card">
                <h2>Technique</h2>
                <p>Divide & Conquer</p>
            </div>

        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
